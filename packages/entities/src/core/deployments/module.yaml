# Deployments Entity Module Manifest
#
# Deployments define logical instance configurations with capability-based
# architecture. They map component definitions (controllers, services, views)
# to deployment instances with scaling, communication channels, and
# infrastructure concerns (storage, security, monitoring).
#
# This manifest declares all implemented facets and their locations,
# enabling the build system to discover, compile, and register the module.

name: deployments
type: core
version: 3.5.1
depends_on: [models, controllers, services, events, views]

# ============================================================================
# Facets
# ============================================================================

facets:
  # JSON Schema for validating deployment definitions in .specly files
  schema: schema/deployments.schema.json

  # Convention processor: expands deployment shorthand and capabilities
  conventions:
    structural: conventions/deployment-processor.ts
    behavioural: behaviour/conventions/grammar.yaml

  # Inference rules: component → deployment instance generation
  inference:
    entry: inference/index.ts
    rules:
      - inference/v3.1-deployment-rules.json

  # Behavioural specification (Quint)
  behaviour:
    rules: behaviour/rules.qnt
    invariants: behaviour/invariants.qnt

  # Code generators (instance factory references)
  generators: generators/index.ts

  # Documentation references
  docs: docs/index.ts

  # Test references
  tests: tests/index.ts

  # Example specifications
  examples: examples/

# ============================================================================
# Diagram Plugins
# ============================================================================

diagrams:
  - type: deployment
    variants: [topology, capability-flow]
  - type: manifest

# ============================================================================
# Delivery Connections
# ============================================================================
# How this entity connects to the existing subsystem infrastructure.

delivery:
  parser: true          # Deployments appear in parsed .specly files
  inference: true       # Deployments are generated by inference (component → instances)
  realize: true         # Deployments can be realized to infrastructure code
  cli: true             # Deployments support CLI commands (validate, inspect)
