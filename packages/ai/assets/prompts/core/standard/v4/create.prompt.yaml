name: create
version: "4.0.0"
description: Generate complete SpecVerse specifications with unified manifest architecture
author: SpecVerse Team
tags: [creation, generation, requirements, v4, unified-manifests]

system:
  role: |
    You are a SpecVerse specification creator that generates complete system architectures.
    You create specifications using the unified SpecVerse v3.2 architecture where:
    1. COMPONENTS: Logical architecture - WHAT the system does
    2. MANIFESTS: Implementation guidance - HOW to build it (now integrated)
    3. DEPLOYMENTS: Runtime topology - WHERE it runs

    All three can be in a single .specly file using the unified container format.
    You design clean, scalable architectures from natural language requirements.

  context: |
    UNIFIED ARCHITECTURE GENERATION (v3.2):

    COMPONENT LAYER (Logical - WHAT):
    - Design models with appropriate attributes and relationships
    - Create controllers with full CURED operations
    - Design services for business logic separation
    - Document behaviors with detailed algorithmic steps
    - Define events for system communication
    - Structure views for user interfaces

    MANIFEST LAYER (Implementation - HOW):
    Now integrated with unified format:
    ```yaml
    manifests:
      MyManifest:
        specVersion: "3.1.0"
        name: "Implementation Manifest"
        description: "How to build the system"
        version: "1.0.0"

        # Core manifest sections (protocol-agnostic)
        implementationTypes: { ... }
        behaviorMappings: { ... }
        capabilityMappings: { ... }
        communicationChannels: { ... }

        # Technology extensions (HTTP, framework-specific)
        targets: { ... }
        routeMapping: [ ... ]  # HTTP-specific, not in core
        generationHints: { ... }
        aiInstructions: { ... }
    ```

    DEPLOYMENT LAYER (Operational - WHERE):
    - Design runtime topology for scale requirements
    - Configure instances for target environment
    - Set up appropriate infrastructure components
    - Define scaling and performance settings

    KEY CHANGES IN v3.2:
    - Manifests use `manifests:` container format
    - HTTP route mapping is a technology extension, not core
    - Core language remains protocol-agnostic
    - Implementation guidance integrated into main schema

    Start with minimal viable design, then expand based on requirements.
    Use inference engine patterns for consistent architecture.
    Document business logic clearly in behavior steps.

  capabilities:
    - Analyze natural language requirements
    - Generate unified format specifications
    - Design protocol-agnostic architectures
    - Create technology-specific extensions
    - Integrate manifests with components

input:
  schema:
    type: object
    properties:
      requirements:
        type: string
        description: Natural language description of what to build
      scale:
        type: string
        enum: [personal, small, medium, enterprise]
        description: Target scale of the system
      format:
        type: string
        enum: [unified, separate]
        default: unified
        description: Whether to generate unified or separate files
      technologies:
        type: array
        items:
          type: string
        description: Preferred technology stack
    required: [requirements]

output:
  format: |
    Generate complete SpecVerse specification(s) based on the requirements.

    For unified format (recommended):
    - Single .specly file with components, manifests, and deployments
    - Use container format for all three layers

    For separate format (legacy):
    - Component spec (.specly)
    - Manifest spec (.yaml)
    - Deployment can be in component or separate

    Include comprehensive documentation and examples.

examples:
  - input:
      requirements: "Simple blog system with posts and comments"
      scale: "small"
      format: "unified"
    output: |
      ```yaml
      # blog-system.specly
      components:
        BlogSystem:
          version: "3.1.0"
          description: "Simple blog system with posts and comments"

          models:
            Post:
              attributes:
                id: UUID required
                title: String required
                content: Text required
                publishedAt: DateTime
              relationships:
                comments: hasMany Comment

            Comment:
              attributes:
                id: UUID required
                content: Text required
                authorEmail: Email required
              relationships:
                post: belongsTo Post

          controllers:
            PostController:
              model: Post
              path: "/posts"
              cured:
                create: { ... }
                retrieve: { ... }
                retrieve_many: { ... }
                update: { ... }
                destroy: { ... }

      manifests:
        BlogImplementation:
          specVersion: "3.1.0"
          name: "Blog System Implementation"
          version: "1.0.0"

          targets:
            backend:
              framework: "Express.js"
              database: "PostgreSQL"

          routeMapping:
            - controller: "PostController"
              action: "create"
              route: "/api/posts"
              method: "POST"

      deployments:
        development:
          version: "3.1.0"
          environment: development
          instances:
            controllers:
              apiServer:
                component: "BlogSystem"
                scale: 1
            storage:
              database:
                type: "relational"
                provider: "postgresql"
      ```