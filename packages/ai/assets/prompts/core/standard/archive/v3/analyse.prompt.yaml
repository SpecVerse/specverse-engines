  created: "2024-01-01T00:00:00Z"
  updated: "2024-01-01T00:00:00Z"
  improvements_v3:
    - "Three-layer architecture: Component, Manifest, Deployment"
    - "Detailed behavior steps for algorithm documentation"
    - "Complete manifest with technical implementation details"
    - "Clear separation of logical vs technical concerns"
    - "SQL queries and database mappings captured"
    - "API patterns and response formats documented"