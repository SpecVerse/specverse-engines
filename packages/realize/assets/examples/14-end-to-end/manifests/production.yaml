manifests:
  TaskManagementProduction:
    specVersion: "3.5.0"
    name: "task-management-production"
    description: "Production environment with RabbitMQ, Redis caching, and horizontal scaling"
    version: "1.0.0"
    deployment:
      deploymentSource: "../12-01-task-management-app.specly"
      deploymentName: "production"
    defaultMappings:
      storage: "PostgreSQL15"
      controller: "PrismaServices"
      service: "PrismaServices"
      routing: "FastifyAPI"
      orm: "PrismaORM"
      view: "ReactComponents"
      communication: "RabbitMQEvents"
      cache: "RedisCache"
    capabilityMappings:
      - capability: "api.rest"
        instanceFactory: "FastifyAPI"
      - capability: "service.controller"
        instanceFactory: "PrismaServices"
      - capability: "service.business"
        instanceFactory: "PrismaServices"
      - capability: "service.crud"
        instanceFactory: "PrismaServices"
      - capability: "storage.database"
        instanceFactory: "PostgreSQL15"
      - capability: "storage.cache"
        instanceFactory: "RedisCache"
      - capability: "orm.schema"
        instanceFactory: "PrismaORM"
      - capability: "orm.client"
        instanceFactory: "PrismaORM"
      - capability: "ui.components"
        instanceFactory: "ReactComponents"
      - capability: "ui.views"
        instanceFactory: "ReactComponents"
      - capability: "ui.forms"
        instanceFactory: "ReactComponents"
      - capability: "messaging.pubsub"
        instanceFactory: "RabbitMQEvents"
      - capability: "messaging.events"
        instanceFactory: "RabbitMQEvents"
      - capability: "messaging.queue"
        instanceFactory: "RabbitMQEvents"
      - capability: "validation.runtime"
        instanceFactory: "ZodValidation"
      - capability: "validation.schema"
        instanceFactory: "ZodValidation"
    configuration:
      api:
        framework: "fastify"
        port: 3000
        host: "0.0.0.0"
        clustering:
          enabled: true
          workers: 4
        cors:
          enabled: true
          origins:
            - "https://tasks.example.com"
        rateLimit:
          enabled: true
          max: 1000
          timeWindow: "1 minute"
        logging:
          level: "info"
          prettyPrint: false
      database:
        provider: "postgresql"
        url: "${DATABASE_URL}"
        poolSize: 20
        connectionTimeout: 10000
        ssl:
          enabled: true
        migrations:
          autoRun: false
          directory: "prisma/migrations"
      cache:
        provider: "redis"
        url: "${REDIS_URL}"
        ttl: 3600
        keyPrefix: "taskapp:"
      messaging:
        provider: "rabbitmq"
        url: "${RABBITMQ_URL}"
        exchange: "taskmanagement"
        exchangeType: "topic"
        prefetch: 10
        durable: true
        persistent: true
      frontend:
        framework: "react"
        buildTool: "vite"
        outputDir: "dist/client"
        publicPath: "https://cdn.example.com/tasks/"
        optimization:
          minify: true
          sourcemaps: false
          splitting: true
        styling:
          framework: "tailwindcss"
          purge: true
        stateManagement:
          library: "react-query"
          cacheTime: 300000
      infrastructure:
        containerization: "docker"
        orchestration: "kubernetes"
        monitoring:
          enabled: true
          provider: "prometheus"
        healthChecks:
          enabled: true
          interval: 30
      output:
        backend: "dist/server"
        frontend: "dist/client"
        database: "dist/database"
        events: "dist/events"
        infrastructure: "dist/k8s"
