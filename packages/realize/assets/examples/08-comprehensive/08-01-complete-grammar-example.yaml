            flow: "unpaid -> pending -> paid -> partially_refunded -> refunded"
        behaviors:
          calculateTotal:
            parameters:
              includeTax:
                name: "includeTax"
                type: "Boolean"
                required: false
                unique: false
                default: "true"
              applyDiscounts:
                name: "applyDiscounts"
                type: "Boolean"
                required: false
                unique: false
                default: "true"
            description: "Calculate order total including tax, shipping, and discounts"
            returns: "Money"
            requires:
              - "order has items"
            ensures:
              - "total matches sum of components"
            publishes:
              - "OrderTotalCalculated"
          validateOrder:
            parameters:
              value:
                name: "value"
                type: "String"
                required: true
                unique: false
            returns: "String"
            requires:
              - "customer exists"
              - "order has items"
            ensures:
              - "validation result is complete"
          attachProfile:
            description: "Attach a profile to this model instance"
            parameters:
              profileName:
                name: "profileName"
                type: "String"
                required: true
                unique: false
            returns: "Boolean"
            requires:
