components:
  ECommercePlatform:
    version: "3.2.0"
    description: "Complete e-commerce platform demonstrating all SpecVerse v3.2 language features"
    tags:
      - "ecommerce"
      - "platform"
      - "microservices"
      - "comprehensive"
    import:
      - file: "../common/common-definitions.yaml"
        select:
          - "UUID"
          - "Money"
          - "Email"
          - "Phone"
          - "DateTime"
          - "Address"
    export:
      models:
        - "User"
        - "Product"
        - "Order"
        - "Payment"
        - "Category"
        - "ProductReview"
        - "OrderItem"
        - "Shipment"
        - "ProductVariant"
      controllers:
        - "UserController"
        - "ProductController"
        - "OrderController"
      services:
        - "PaymentService"
        - "NotificationService"
        - "InventoryService"
      events:
        - "UserRegistered"
        - "UserLoggedIn"
        - "OrderCreated"
        - "PaymentProcessed"
        - "ProductRestocked"
        - "OrderStatusChanged"
      views:
        - "UserProfileView"
        - "ProductCatalogView"
        - "OrderTrackingView"
    models:
      User:
        description: "System user with authentication and profile management"
        attributes:
          id:
            name: "id"
            type: "UUID"
            required: true
            unique: true
          email:
            name: "email"
            type: "Email"
            required: true
            unique: true
          firstName:
            name: "firstName"
            type: "String"
            required: true
            unique: false
          lastName:
            name: "lastName"
            type: "String"
            required: true
            unique: false
          phone:
            name: "phone"
            type: "Phone"
            required: false
            unique: false
          dateOfBirth:
            name: "dateOfBirth"
            type: "String"
            required: false
            unique: false
          isActive:
            name: "isActive"
            type: "Boolean"
            required: false
            unique: false
            default: "true"
          loyaltyPoints:
            name: "loyaltyPoints"
            type: "Integer"
            required: false
            unique: false
            default: "0"
          tier:
            name: "tier"
            type: "String"
            required: false
            unique: false
            default: "bronze"
          profile:
            name: "profile"
            type: "String"
            required: false
            unique: false
          preferences:
            name: "preferences"
            type: "String"
            required: false
            unique: false
          lastLoginAt:
            name: "lastLoginAt"
            type: "DateTime"
            required: false
            unique: false
          createdAt:
            name: "createdAt"
            type: "DateTime"
            required: true
            unique: false
          updatedAt:
            name: "updatedAt"
            type: "DateTime"
            required: false
            unique: false
        relationships:
          orders:
            name: "orders"
            type: "hasMany"
            target: "Order"
          addresses:
            name: "addresses"
            type: "hasMany"
            target: "Address"
          payments:
            name: "payments"
            type: "hasMany"
            target: "Payment"
          reviews:
            name: "reviews"
            type: "hasMany"
            target: "ProductReview"
        lifecycles:
          account:
            flow: "pending -> verified -> active -> suspended -> deactivated"
        behaviors:
          authenticate:
            parameters:
              email:
                name: "email"
                type: "Email"
                required: true
                unique: false
              password:
                name: "password"
                type: "String"
                required: true
                unique: false
            description: "Authenticate user with email and password"
            returns: "String"
            requires:
              - "user exists"
              - "account is active"
            ensures:
              - "token is valid"
              - "login attempt logged"
            publishes:
              - "UserLoggedIn"
          updateProfile:
            parameters:
              value:
                name: "value"
                type: "String"
                required: true
                unique: false
            description: "Update user profile information"
            returns: "User"
            requires:
              - "user is authenticated"
            ensures:
              - "profile updated"
              - "cache invalidated"
            publishes:
              - "UserProfileUpdated"
          attachProfile:
            description: "Attach a profile to this model instance"
            parameters:
              profileName:
                name: "profileName"
                type: "String"
                required: true
                unique: false
            returns: "Boolean"
            requires:
              - "Profile exists and is compatible with this model"
            ensures:
              - "Profile is attached"
              - "Profile attributes are available"
          detachProfile:
            description: "Detach a profile from this model instance"
            parameters:
              profileName:
                name: "profileName"
                type: "String"
                required: true
                unique: false
            returns: "Boolean"
            requires:
              - "Profile is currently attached"
            ensures:
              - "Profile is detached"
              - "Profile attributes are no longer available"
          hasProfile:
            description: "Check if a profile is attached to this model instance"
            parameters:
              profileName:
                name: "profileName"
                type: "String"
                required: true
                unique: false
            returns: "Boolean"
      Product:
        description: "Product in the e-commerce catalog"
        attributes:
          id:
            name: "id"
            type: "UUID"
            required: true
            unique: true
          sku:
            name: "sku"
            type: "String"
            required: true
            unique: true
          name:
            name: "name"
            type: "String"
            required: true
            unique: false
          description:
            name: "description"
            type: "String"
            required: false
            unique: false
          price:
            name: "price"
            type: "Money"
            required: true
            unique: false
          cost:
            name: "cost"
            type: "Money"
            required: true
            unique: false
          stock:
            name: "stock"
            type: "Integer"
            required: false
            unique: false
            default: "0"
          category:
            name: "category"
            type: "String"
            required: true
            unique: false
          brand:
            name: "brand"
            type: "String"
            required: false
            unique: false
          weight:
            name: "weight"
            type: "String"
            required: false
            unique: false
          dimensions:
            name: "dimensions"
            type: "String"
            required: false
            unique: false
          images:
            name: "images"
            type: "String"
            required: false
            unique: false
          tags:
            name: "tags"
            type: "String"
            required: false
            unique: false
          isActive:
            name: "isActive"
            type: "Boolean"
            required: false
            unique: false
            default: "true"
          createdAt:
            name: "createdAt"
            type: "DateTime"
            required: true
            unique: false
          updatedAt:
            name: "updatedAt"
            type: "DateTime"
            required: false
            unique: false
        relationships:
          category:
            name: "category"
            type: "belongsTo"
            target: "Category"
          reviews:
            name: "reviews"
            type: "hasMany"
            target: "ProductReview"
          orderItems:
            name: "orderItems"
            type: "hasMany"
            target: "OrderItem"
          variants:
            name: "variants"
            type: "hasMany"
            target: "ProductVariant"
        lifecycles:
          status:
            flow: "draft -> review -> active -> discontinued -> archived"
          inventory:
            flow: "in_stock -> low_stock -> out_of_stock -> discontinued"
        behaviors:
          calculateDiscount:
            parameters:
              quantity:
                name: "quantity"
                type: "Integer"
                required: true
                unique: false
              customerTier:
                name: "customerTier"
                type: "String"
                required: true
                unique: false
              promoCode:
                name: "promoCode"
                type: "String"
                required: false
                unique: false
            description: "Calculate discount based on quantity and customer tier"
            returns: "Money"
            requires:
              - "product is active"
              - "quantity > 0"
            ensures:
              - "discount is non-negative"
            publishes:
              - "DiscountCalculated"
          checkAvailability:
            parameters:
              value:
                name: "value"
                type: "Integer"
                required: true
                unique: false
            returns: "Boolean"
            requires:
              - "product exists"
            ensures:
              - "availability check is accurate"
          attachProfile:
            description: "Attach a profile to this model instance"
            parameters:
              profileName:
                name: "profileName"
                type: "String"
                required: true
                unique: false
            returns: "Boolean"
            requires:
              - "Profile exists and is compatible with this model"
            ensures:
              - "Profile is attached"
              - "Profile attributes are available"
          detachProfile:
            description: "Detach a profile from this model instance"
            parameters:
              profileName:
                name: "profileName"
                type: "String"
                required: true
                unique: false
            returns: "Boolean"
            requires:
              - "Profile is currently attached"
            ensures:
              - "Profile is detached"
              - "Profile attributes are no longer available"
          hasProfile:
            description: "Check if a profile is attached to this model instance"
            parameters:
              profileName:
                name: "profileName"
                type: "String"
                required: true
                unique: false
            returns: "Boolean"
