            parameters:
              profileName:
                name: "profileName"
                type: "String"
                required: true
                unique: false
            returns: "Boolean"
            requires:
              - "Profile exists and is compatible with this model"
            ensures:
              - "Profile is attached"
              - "Profile attributes are available"
          detachProfile:
            description: "Detach a profile from this model instance"
            parameters:
              profileName:
                name: "profileName"
                type: "String"
                required: true
                unique: false
            returns: "Boolean"
            requires:
              - "Profile is currently attached"
            ensures:
              - "Profile is detached"
              - "Profile attributes are no longer available"
          hasProfile:
            description: "Check if a profile is attached to this model instance"
            parameters:
              profileName:
                name: "profileName"
                type: "String"
                required: true
                unique: false
            returns: "Boolean"
    controllers:
      UserController:
        model: "User"
        description: "User management and authentication endpoints"
        actions:
          register:
            parameters:
              userData:
                name: "userData"
                type: "String"
                required: true
                unique: false
              sendWelcomeEmail:
                name: "sendWelcomeEmail"
                type: "Boolean"
                required: false
                unique: false
                default: "true"
            description: "Register new user account"
            returns: "User"
            requires:
              - "email is unique"
              - "password meets policy"
            ensures:
              - "user created"
              - "welcome email sent"
            publishes:
              - "UserRegistered"
          login:
            parameters:
              value:
                name: "value"
                type: "String"
                required: true
                unique: false
            description: "Authenticate user and create session"
            returns: "String"
            requires:
              - "credentials are valid"
            ensures:
              - "token created"
              - "login logged"
            publishes:
              - "UserLoggedIn"
          getProfile:
            parameters:
              userId:
                name: "userId"
                type: "UUID"
                required: true
                unique: false
              includePreferences:
                name: "includePreferences"
                type: "Boolean"
                required: false
                unique: false
                default: "false"
            description: "Get user profile information"
            returns: "User"
            requires:
              - "user is authenticated"
            ensures:
              - "profile data returned"
          updateProfile:
            parameters:
              value:
                name: "value"
                type: "String"
                required: true
                unique: false
            description: "Update user profile"
            returns: "User"
            requires:
              - "user owns profile or is admin"
            ensures:
              - "profile updated"
              - "cache invalidated"
            publishes:
              - "UserProfileUpdated"
      ProductController:
        model: "Product"
        description: "Product catalog management"
        actions:
          listProducts:
            parameters:
              category:
                name: "category"
                type: "String"
                required: false
                unique: false
              priceMin:
                name: "priceMin"
                type: "Money"
                required: false
                unique: false
              priceMax:
                name: "priceMax"
                type: "Money"
                required: false
                unique: false
              search:
                name: "search"
                type: "String"
                required: false
                unique: false
              page:
                name: "page"
                type: "Integer"
                required: false
                unique: false
                default: "1"
              limit:
                name: "limit"
                type: "Integer"
                required: false
                unique: false
                default: "20"
              sortBy:
                name: "sortBy"
                type: "String"
                required: false
                unique: false
                default: "name"
              sortOrder:
                name: "sortOrder"
                type: "String"
                required: false
                unique: false
                default: "asc"
            description: "Get paginated list of products with filtering"
            returns: "String"
            ensures:
              - "results are paginated"
              - "filters applied correctly"
          getProduct:
            parameters:
              uUID:
                name: "uUID"
                type: "UUID"
                required: true
                unique: false
            description: "Get single product by ID"
            returns: "Product"
            requires:
              - "product exists"
            ensures:
              - "complete product data returned"
      OrderController:
        model: "Order"
        description: "Order management and processing"
        actions:
          createOrder:
            parameters:
              customerId:
                name: "customerId"
                type: "UUID"
                required: true
                unique: false
              items:
                name: "items"
                type: "String"
                required: true
                unique: false
              shippingAddress:
                name: "shippingAddress"
                type: "String"
                required: true
                unique: false
              billingAddress:
                name: "billingAddress"
                type: "String"
                required: true
                unique: false
            description: "Create new customer order"
            returns: "Order"
            requires:
              - "customer exists"
              - "items are valid"
            ensures:
              - "order created"
              - "inventory reserved"
            publishes:
              - "OrderCreated"
          getOrder:
            parameters:
              uUID:
                name: "uUID"
                type: "UUID"
                required: true
                unique: false
            returns: "Order"
            requires:
              - "order exists"
              - "user has access"
            ensures:
              - "order data returned"
          updateOrderStatus:
            parameters:
              orderId:
                name: "orderId"
                type: "UUID"
                required: true
                unique: false
              status:
                name: "status"
                type: "String"
                required: true
                unique: false
              notes:
                name: "notes"
                type: "String"
                required: false
                unique: false
            description: "Update order fulfillment status"
            returns: "Order"
            requires:
              - "order exists"
              - "status transition is valid"
            ensures:
              - "status updated"
              - "notifications sent"
            publishes:
              - "OrderStatusChanged"
    services:
      PaymentService:
        description: "External payment processing service"
        operations:
          processPayment:
            parameters:
              value:
                name: "value"
                type: "String"
                required: true
                unique: false
            description: "Process payment for an order"
            returns: "String"
          refundPayment:
            parameters:
              value:
                name: "value"
                type: "String"
                required: true
                unique: false
            description: "Process refund for a payment"
            returns: "String"
          validateCard:
            parameters:
              value:
                name: "value"
                type: "String"
                required: true
                unique: false
            description: "Validate credit card information"
            returns: "String"
          getPaymentStatus:
            parameters:
              value:
                name: "value"
                type: "String"
                required: true
                unique: false
            description: "Check status of a payment transaction"
            returns: "String"
      NotificationService:
        description: "Multi-channel notification service"
        operations:
          sendEmail:
            parameters:
              value:
                name: "value"
                type: "String"
                required: true
                unique: false
            description: "Send email notification"
            returns: "String"
          sendSMS:
            parameters:
              value:
                name: "value"
                type: "String"
                required: true
                unique: false
            description: "Send SMS notification"
            returns: "String"
          sendPushNotification:
            parameters:
              value:
                name: "value"
                type: "String"
                required: true
                unique: false
            description: "Send push notification to mobile devices"
            returns: "String"
      InventoryService:
        description: "Inventory and stock management service"
        operations:
          checkStock:
            parameters:
              value:
                name: "value"
                type: "String"
                required: true
                unique: false
            description: "Check available stock for products"
            returns: "String"
          reserveStock:
            parameters:
              value:
                name: "value"
                type: "String"
                required: true
                unique: false
            description: "Reserve stock for an order"
            returns: "String"
          releaseStock:
            parameters:
              value:
                name: "value"
                type: "String"
                required: true
                unique: false
            description: "Release reserved stock"
            returns: "String"
    events:
      UserRegistered:
        description: "New user account was created"
        attributes:
          userId:
            name: "userId"
            type: "UUID"
            required: true
            unique: false
          email:
            name: "email"
            type: "Email"
            required: true
            unique: false
          registrationDate:
            name: "registrationDate"
            type: "DateTime"
            required: true
            unique: false
          source:
            name: "source"
            type: "String"
            required: true
            unique: false
      UserLoggedIn:
        description: "User successfully authenticated"
        attributes:
          userId:
            name: "userId"
            type: "UUID"
            required: true
            unique: false
          loginTime:
            name: "loginTime"
            type: "DateTime"
            required: true
            unique: false
          ipAddress:
            name: "ipAddress"
            type: "String"
            required: false
            unique: false
          userAgent:
            name: "userAgent"
            type: "String"
            required: false
            unique: false
      OrderCreated:
        description: "New order was placed"
        attributes:
          orderId:
            name: "orderId"
            type: "UUID"
            required: true
            unique: false
          customerId:
            name: "customerId"
            type: "UUID"
            required: true
            unique: false
          orderTotal:
            name: "orderTotal"
            type: "Money"
            required: true
            unique: false
          itemCount:
            name: "itemCount"
            type: "Integer"
            required: true
            unique: false
          orderDate:
            name: "orderDate"
            type: "DateTime"
            required: true
            unique: false
      PaymentProcessed:
        description: "Payment was successfully processed"
        attributes:
          paymentId:
            name: "paymentId"
            type: "UUID"
            required: true
            unique: false
          orderId:
            name: "orderId"
            type: "UUID"
            required: true
            unique: false
          amount:
            name: "amount"
            type: "Money"
            required: true
            unique: false
          method:
            name: "method"
            type: "String"
            required: true
            unique: false
          processedAt:
            name: "processedAt"
            type: "DateTime"
            required: true
            unique: false
      ProductRestocked:
        description: "Product inventory was replenished"
        attributes:
          productId:
            name: "productId"
            type: "UUID"
            required: true
            unique: false
          newStock:
            name: "newStock"
            type: "Integer"
            required: true
            unique: false
          restockDate:
            name: "restockDate"
            type: "DateTime"
            required: true
            unique: false
          supplier:
            name: "supplier"
            type: "String"
            required: false
            unique: false
      OrderStatusChanged:
        description: "Order status was updated"
        attributes:
          orderId:
            name: "orderId"
            type: "UUID"
            required: true
            unique: false
          oldStatus:
            name: "oldStatus"
            type: "String"
            required: true
            unique: false
          newStatus:
            name: "newStatus"
            type: "String"
            required: true
            unique: false
          changedAt:
            name: "changedAt"
            type: "DateTime"
            required: true
            unique: false
          changedBy:
            name: "changedBy"
            type: "UUID"
            required: false
            unique: false
    views:
      UserProfileView:
        description: "User profile management interface"
        type: "page"
        model: "User"
        uiComponents:
          ProfileForm: "UI.FormView"
          AddressList: "UI.ListView"
          OrderHistory: "UI.TableView"
          PreferenceSettings: "UI.FormView"
      ProductCatalogView:
        description: "Product browsing and search interface"
        type: "page"
        model: "Product"
        uiComponents:
          ProductGrid: "UI.GridView"
          SearchFilters: "UI.FilterView"
          CategoryNav: "UI.NavigationView"
          ProductCard: "UI.CardView"
          Pagination: "UI.PaginationView"
      OrderTrackingView:
        description: "Order status and tracking interface"
        type: "page"
        model: "Order"
        uiComponents:
          OrderDetails: "UI.DetailView"
          StatusTimeline: "UI.TimelineView"
          TrackingMap: "UI.MapView"
          ContactSupport: "UI.ActionView"
deployments:
  ecommercePlatform:
