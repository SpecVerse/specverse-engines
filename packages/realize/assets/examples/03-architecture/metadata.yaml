# Architecture Examples Metadata
category: "architecture"
title: "SpecVerse System Architecture"
description: "Design complete system architectures with controllers, services, events, and views"
targetAudience: "intermediate"
estimatedTime: "5-6 hours"

learningObjectives:
  - "Master enhanced import system for modular specifications"
  - "Design API controllers with actions and proper contracts"
  - "Create service-oriented architectures with clear boundaries"
  - "Implement event-driven communication patterns"
  - "Build user interfaces with declarative view components"
