# Fundamentals Examples Metadata
category: "fundamentals"
title: "SpecVerse Fundamentals"
description: "Learn the basic building blocks of SpecVerse specifications through progressive examples"
targetAudience: "beginners"
estimatedTime: "3-4 hours"

learningObjectives:
  - "Understand model structure and attributes with proper typing"
  - "Define lifecycles for state management and transitions"
  - "Create declarative behaviors with contracts and event publishing"
  - "Build relationships between models using relations"
  - "Apply validation constraints and business rules"

examples:
  - id: "01-01-basic-model"
    title: "Basic Model Definition"
    description: "Your first SpecVerse model with attributes, types, and constraints"
    concepts: ["models", "attributes", "types", "constraints", "validation"]
    prerequisites: []
    difficulty: "beginner"
    estimatedTime: "30 minutes"
    formats: ["specly", "yaml"]
    learningObjectives:
      - "Define a model with typed attributes"
      - "Apply constraints like required and default values"
      - "Understand basic SpecVerse type system"
    specverseFeatures: ["Models", "Attributes", "Type System", "Constraints"]
    realWorldUseCase: "Product catalog, user profiles, any basic entity"

  - id: "01-02-model-with-lifecycle"
    title: "Adding Lifecycles"
    description: "State management with lifecycles, states, and transitions"
    concepts: ["lifecycles", "states", "transitions", "triggers", "events"]
    prerequisites: ["01-01-basic-model"]
    difficulty: "beginner"
    estimatedTime: "45 minutes"
    formats: ["specly", "yaml"]
    learningObjectives:
      - "Define lifecycle states for model state management"
      - "Create state transitions with conditions"
      - "Publish events during state changes"
    specverseFeatures: ["Lifecycles", "State Management", "Events"]
    realWorldUseCase: "Order processing, user activation, inventory management"

  - id: "01-03-model-with-behaviors"
    title: "Model Behaviors"
    description: "Business logic with behaviors, parameters, contracts, and events"
    concepts: ["behaviors", "parameters", "requires", "ensures", "events", "declarative-logic"]
    prerequisites: ["01-01-basic-model", "01-02-model-with-lifecycle"]
    difficulty: "beginner"
    estimatedTime: "60 minutes"
    formats: ["specly", "yaml"]
    learningObjectives:
      - "Define declarative behaviors for business logic"
      - "Use Requires/Ensures contracts for validation"
      - "Publish events from behavior execution"
      - "Handle behavior parameters with types"
    specverseFeatures: ["Behaviors", "Contracts", "Event Publishing", "Parameters"]
    realWorldUseCase: "Price calculations, inventory updates, user actions"

  - id: "01-04-models-with-relations"
    title: "Model Relationships"
    description: "Connecting models with relations, foreign keys, and associations"
    concepts: ["relations", "foreign-keys", "associations", "navigation", "hasMany", "belongsTo"]
    prerequisites: ["01-01-basic-model"]
    difficulty: "beginner"
    estimatedTime: "45 minutes"
    formats: ["specly", "yaml"]
    learningObjectives:
      - "Create relationships between models"
      - "Understand HasMany and BelongsTo patterns"
      - "Navigate related data in behaviors"
      - "Model complex domain relationships"
    specverseFeatures: ["Relations", "Model Associations", "Navigation"]
    realWorldUseCase: "Customer orders, blog posts with comments, organizational hierarchies"

nextSteps:
  - category: "02-profiles"
    description: "Learn the powerful profile system for model composition"
    reason: "Profiles build on solid model foundations to enable flexible composition"
  - category: "03-architecture"
    description: "Understand controllers, services, and system architecture"
    reason: "Apply model knowledge to build complete system architectures"

validationCommands:
  - "specverse validate 01-fundamentals/01-01-basic-model.specly"
  - "specverse validate 01-fundamentals/01-02-model-with-lifecycle.specly"
  - "specverse validate 01-fundamentals/01-03-model-with-behaviors.specly"
  - "specverse validate 01-fundamentals/01-04-models-with-relations.specly"

# Key teaching progression:
# 1. Start with simple model structure (attributes, types)
# 2. Add dynamic behavior (lifecycles, state changes)
# 3. Add business logic (behaviors, contracts)
# 4. Add complexity (relationships, navigation)
# This builds confidence and understanding incrementally